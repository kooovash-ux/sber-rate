<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IT & English — подготовка к собеседованию</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F7F9;
    --card:#FFFFFF;
    --navy:#0A1E3D;
    --ink:#1F2937;
    --muted:#6B7280;
    --line:#E7E9ED;
    --green:#21A038;
    --green-soft:rgba(33,160,56,.10);
    --red:#DC2626;
    --red-soft:rgba(220,38,38,.08);
    --shadow:0 1px 2px rgba(10,30,61,.04),0 8px 24px rgba(10,30,61,.06);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap{max-width:680px;margin:0 auto;padding:20px 16px 64px}
  .top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:14px}
  .brand{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
  .brand b{color:var(--green)}
  .count{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);white-space:nowrap}

  .bar{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:20px}
  .bar span{display:block;height:100%;width:0;background:var(--green);border-radius:999px;transition:width .35s ease}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
  @media(min-width:520px){.card{padding:28px}}

  .lvl{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--navy);background:var(--green-soft);border:1px solid rgba(33,160,56,.22);padding:5px 11px;border-radius:999px;margin-bottom:16px}
  .lvl .dot{width:6px;height:6px;border-radius:999px;background:var(--green)}

  .q{font-size:19px;font-weight:600;color:var(--navy);margin:0 0 6px;letter-spacing:-.01em}
  @media(min-width:520px){.q{font-size:21px}}

  /* выделенный термин + перевод */
  .term{font-family:"JetBrains Mono",monospace;font-weight:600;color:var(--green);background:var(--green-soft);padding:1px 6px;border-radius:6px;white-space:nowrap}
  .tr{display:inline-block;font-size:12px;font-weight:500;color:var(--muted);background:#F1F3F5;border:1px solid var(--line);padding:1px 8px;border-radius:999px;margin-left:6px;vertical-align:middle;white-space:nowrap}

  .opts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
  .opt{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:14px 15px;font:inherit;font-size:15.5px;color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s,transform .05s}
  .opt:hover:not(:disabled){border-color:#C9CDD4}
  .opt:active:not(:disabled){transform:scale(.995)}
  .opt:disabled{cursor:default}
  .opt .key{flex:0 0 auto;width:22px;height:22px;border-radius:6px;border:1px solid var(--line);display:grid;place-items:center;font-size:12px;font-weight:600;color:var(--muted);font-family:"JetBrains Mono",monospace;margin-top:1px}
  .opt.correct{border-color:var(--green);background:var(--green-soft)}
  .opt.correct .key{background:var(--green);border-color:var(--green);color:#fff}
  .opt.wrong{border-color:var(--red);background:var(--red-soft)}
  .opt.wrong .key{background:var(--red);border-color:var(--red);color:#fff}

  .exp{margin-top:16px;border-left:3px solid var(--green);background:#FAFBFC;border-radius:0 10px 10px 0;padding:13px 15px;font-size:14.5px;color:var(--ink);display:none}
  .exp.show{display:block;animation:fade .25s ease}
  .exp .lbl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green);display:block;margin-bottom:4px}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  .next{margin-top:18px;display:none;width:100%;justify-content:center;align-items:center;gap:8px;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:14px;font:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .next.show{display:flex}
  .next:hover{opacity:.92}

  /* интро уровня */
  .intro h2{font-size:22px;color:var(--navy);margin:6px 0 8px;letter-spacing:-.01em}
  .intro p{color:var(--muted);margin:0 0 4px;font-size:15px}
  .intro .start{margin-top:22px}

  /* результат */
  .res{text-align:center}
  .res .score{font-family:"JetBrains Mono",monospace;font-size:54px;font-weight:600;color:var(--green);line-height:1;margin:6px 0 4px}
  .res .frac{color:var(--muted);font-size:14px;font-family:"JetBrains Mono",monospace}
  .res .verdict{font-size:17px;font-weight:600;color:var(--navy);margin:18px 0 6px}
  .res .sub{color:var(--muted);font-size:14.5px;margin:0 auto;max-width:440px}
  .breakdown{margin:22px 0 4px;text-align:left;display:flex;flex-direction:column;gap:8px}
  .br-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
  .br-row .name{flex:1;color:var(--ink)}
  .br-row .mini{flex:0 0 110px;height:6px;background:var(--line);border-radius:999px;overflow:hidden}
  .br-row .mini span{display:block;height:100%;background:var(--green);border-radius:999px}
  .br-row .pct{flex:0 0 44px;text-align:right;font-family:"JetBrains Mono",monospace;color:var(--muted);font-size:12px}
  .again{margin-top:24px}

  .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:18px}
  .kbd{font-family:"JetBrains Mono",monospace;background:#F1F3F5;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:11px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">подготовка · <b>IT &amp; English</b></div>
    <div class="count" id="count"></div>
  </div>
  <div class="bar"><span id="prog"></span></div>
  <div id="app"></div>
  <div class="foot">На компьютере можно отвечать клавишами <span class="kbd">1</span>–<span class="kbd">4</span>, дальше — <span class="kbd">Enter</span></div>
</div>

<script>
/* ===== Уровни ===== */
const LEVELS = {
  1:{name:"Основы: из чего состоит сайт",   intro:"Начнём с фундамента на русском. Это то, что должно отскакивать от зубов: фронт, бэк, сервер, деплой."},
  2:{name:"Вёрстка и веб",                  intro:"Из чего собирается страница: HTML, CSS, JS и базовые блоки интерфейса."},
  3:{name:"Git и процесс разработки",       intro:"Как команда пишет код и выкатывает его. Эти слова ты будешь слышать на каждом созвоне."},
  4:{name:"API, данные и интеграция в ЛК",  intro:"Сердце твоей будущей задачи. Личный кабинет = данные + API. Здесь — внимательнее всего."},
  5:{name:"Управление проектом",            intro:"Твоя зона. Термины, на которых ты ставишь задачи и держишь сроки."},
  6:{name:"English · понимание терминов",   intro:"База закрыта — переключаемся на английский. Читаешь определение на английском, выбираешь верное. Перевод термина подсвечен."},
  7:{name:"English · фразы для команды",     intro:"Финал. Готовые фразы, которыми ты ставишь задачи команде в Бангалоре и отвечаешь на собеседовании. Выучи их — и созвон пройдёшь."}
};

/* ===== Вопросы ===== */
/* term() — англ. термин с подсвеченным переводом */
function term(en, ru){ return `<span class="term">${en}</span><span class="tr">${ru}</span>`; }

const Q = [
/* ---------- Уровень 1: основы ---------- */
{lvl:1, q:`Что такое ${term("frontend","фронтенд")}?`,
 opts:["Всё, что пользователь видит и трогает в браузере: кнопки, формы, дизайн","Сервер, где лежат данные","Программа для бухгалтерии","Язык переговоров с поставщиками"],
 correct:0, exp:"Это то, что видишь на экране: кнопки, текст, картинки."},
{lvl:1, q:`Что такое ${term("backend","бэкенд")}?`,
 opts:["Серверная часть: логика, база данных, обработка запросов","Цвет кнопок на сайте","Папка с фотографиями","Договор с подрядчиком"],
 correct:0, exp:"То, что спрятано на сервере: данные и логика. Глазами не видно."},
{lvl:1, q:`Кто такой ${term("client","клиент")} в вебе?`,
 opts:["Устройство/браузер пользователя, который шлёт запросы","Заказчик, который платит","Менеджер по продажам","Таможенный брокер"],
 correct:0, exp:"Это твой браузер или телефон — он шлёт запросы. Не путать с заказчиком."},
{lvl:1, q:`Что делает ${term("server","сервер")}?`,
 opts:["Принимает запросы и отдаёт данные/страницы","Рисует логотип","Подписывает контракты","Считает зарплату"],
 correct:0, exp:"Компьютер, который отвечает на запросы и отдаёт страницы."},
{lvl:1, q:`Что такое ${term("browser","браузер")}?`,
 opts:["Программа для открытия сайтов: Chrome, Safari","База данных","Язык программирования","Тип сервера"],
 correct:0, exp:"Программа, где открываешь сайты. Chrome, Safari."},
{lvl:1, q:`Что такое ${term("domain","домен")}?`,
 opts:["Адрес сайта, например traderate.ru","Папка на компьютере","Имя разработчика","Тип базы данных"],
 correct:0, exp:"Адрес сайта. У тебя — traderate.ru."},
{lvl:1, q:`Что такое ${term("hosting","хостинг")}?`,
 opts:["Место, где лежат файлы сайта и откуда он доступен в интернете","Дизайн главной страницы","Список задач","Команда разработки"],
 correct:0, exp:"Место, где лежит сайт. GitHub Pages — это хостинг."},
{lvl:1, q:`Что значит ${term("deploy","деплой")}?`,
 opts:["Выложить готовый код на сервер, чтобы он стал доступен людям","Удалить проект","Нарисовать макет","Провести собеседование"],
 correct:0, exp:"Выложить сайт в интернет. Ты это делал через GitHub Pages."},
{lvl:1, q:`Что такое ${term("database","база данных")}?`,
 opts:["Хранилище структурированной информации: пользователи, заказы, ставки","Папка со скриншотами","Чат с командой","Файл Excel на рабочем столе"],
 correct:0, exp:"Где хранятся данные: пользователи, заказы, ставки."},
{lvl:1, q:`Что означает ${term("production","прод")} (часто «прод»)?`,
 opts:["Рабочая, «боевая» версия продукта, которой пользуются реальные люди","Черновик дизайна","Тестовый компьютер разработчика","Совещание по проекту"],
 correct:0, exp:"«Боевая» версия, которой пользуются живые люди."},

/* ---------- Уровень 2: вёрстка ---------- */
{lvl:2, q:`Что такое ${term("HTML","разметка")}?`,
 opts:["Язык разметки: задаёт структуру страницы — заголовки, блоки, текст","Язык для цвета и шрифтов","База данных","Система контроля версий"],
 correct:0, exp:"Скелет страницы: где заголовок, где текст, где блок."},
{lvl:2, q:`За что отвечает ${term("CSS","стили")}?`,
 opts:["Внешний вид: цвета, шрифты, отступы, расположение элементов","Логику расчётов","Хранение данных","Отправку писем"],
 correct:0, exp:"Красота: цвета, шрифты, отступы."},
{lvl:2, q:`Что добавляет ${term("JavaScript","скрипты")}?`,
 opts:["Интерактивность: реакции на клики, расчёты, динамику","Цвет фона","Адрес сайта","Серверное железо"],
 correct:0, exp:"Оживляет страницу. Твой калькулятор считает на нём."},
{lvl:2, q:`Что такое ${term("layout","вёрстка")}?`,
 opts:["Превращение макета дизайнера в работающую веб-страницу","Список задач","Переговоры с клиентом","Резервная копия"],
 correct:0, exp:"Собрать страницу из макета. Это и есть вёрстка."},
{lvl:2, q:`Что такое ${term("header","шапка")}?`,
 opts:["Верхняя часть страницы: логотип, меню навигации","Подвал с контактами","Кнопка отправки","Всплывающее окно"],
 correct:0, exp:"Шапка сверху: логотип и меню."},
{lvl:2, q:`Что такое ${term("footer","подвал")}?`,
 opts:["Нижняя часть страницы: контакты, ссылки, копирайт","Меню сверху","Поле поиска","Картинка на фоне"],
 correct:0, exp:"Подвал внизу: контакты и ссылки."},
{lvl:2, q:`Для чего нужен ${term("grid","сетка")}?`,
 opts:["Раскладывать элементы по сетке — строки и колонки","Хранить пароли","Отправлять запросы на сервер","Рисовать иконки"],
 correct:0, exp:"Раскладка по сетке: строки и колонки."},
{lvl:2, q:`Что делает ${term("flexbox","флексы")}?`,
 opts:["Гибко выравнивает элементы в ряд или столбец","Шифрует данные","Создаёт базу данных","Проверяет английский"],
 correct:0, exp:"Выстраивает элементы в ряд и ровняет их."},
{lvl:2, q:`Что значит ${term("responsive","адаптивный")}?`,
 opts:["Сайт подстраивается под экран телефона и компьютера","Сайт быстро грузится","У сайта красивый логотип","Сайт переведён на английский"],
 correct:0, exp:"Сайт удобен и на телефоне, и на компьютере."},
{lvl:2, q:`Что такое ${term("form","форма")} на сайте?`,
 opts:["Блок с полями ввода для отправки данных: логин, заявка","Анимация загрузки","Цветовая палитра","Тип сервера"],
 correct:0, exp:"Поля для ввода. Через неё логинятся и шлют заявки."},

/* ---------- Уровень 3: Git ---------- */
{lvl:3, q:`Что такое ${term("Git","контроль версий")}?`,
 opts:["Система контроля версий: хранит всю историю изменений кода","Язык программирования","Облачное хранилище фото","Программа для звонков"],
 correct:0, exp:"Хранит историю кода. Можно откатиться назад."},
{lvl:3, q:`Что такое ${term("repository","репозиторий")}?`,
 opts:["Хранилище проекта со всей историей кода","Один файл с паролями","Папка с фотографиями","Список сотрудников"],
 correct:0, exp:"Проект целиком на GitHub. Коротко — «репо»."},
{lvl:3, q:`Что такое ${term("commit","коммит")}?`,
 opts:["Сохранённая точка изменений с описанием, что поменяли","Удаление проекта","Запуск сервера","Звонок с командой"],
 correct:0, exp:"Сохранёнка с подписью, что поменял."},
{lvl:3, q:`Что значит ${term("push","запушить")}?`,
 opts:["Отправить свои коммиты в общий репозиторий","Удалить ветку","Перезагрузить компьютер","Закрыть задачу"],
 correct:0, exp:"Отправить свои правки на GitHub, чтобы видели другие."},
{lvl:3, q:`Что такое ${term("branch","ветка")}?`,
 opts:["Отдельная линия разработки, чтобы не ломать основную версию","Резервная копия базы","Имя сервера","Тип ошибки"],
 correct:0, exp:"Своя ветка, чтобы не сломать рабочую версию."},
{lvl:3, q:`Что такое ${term("merge","слияние")}?`,
 opts:["Объединение веток — например, готовой фичи с основной","Удаление кода","Запуск тестов","Отправка письма"],
 correct:0, exp:"Слить готовую ветку с основной."},
{lvl:3, q:`Что такое ${term("pull request","запрос на слияние")} (PR)?`,
 opts:["Запрос на проверку и принятие изменений перед слиянием","Просьба поднять зарплату","Запрос данных у клиента","Откат к старой версии"],
 correct:0, exp:"«Вот мои правки, гляньте и примите»."},
{lvl:3, q:`Что такое ${term("code review","ревью кода")}?`,
 opts:["Проверка кода другим разработчиком перед добавлением","Тест английского","Расчёт стоимости проекта","Встреча с заказчиком"],
 correct:0, exp:"Коллега смотрит твой код перед добавлением."},
{lvl:3, q:`Что такое ${term("bug","баг")} и ${term("fix","фикс")}?`,
 opts:["Ошибка в работе программы и её исправление","Новая фича и её дизайн","Сервер и база данных","Логин и пароль"],
 correct:0, exp:"Bug — поломка, fix — починка."},
{lvl:3, q:`Что такое ${term("CI/CD","автосборка и выкатка")}?`,
 opts:["Автоматическая сборка и выкладка кода при изменениях","Тип базы данных","Язык разметки","Метод оплаты"],
 correct:0, exp:"Код сам собирается и выкатывается, без ручной работы."},

/* ---------- Уровень 4: API / данные / ЛК ---------- */
{lvl:4, q:`Что такое ${term("API","интерфейс")}?`,
 opts:["Способ, которым две программы обмениваются данными","Дизайн кнопки","Имя сервера","Язык программирования"],
 correct:0, exp:"Через него программы обмениваются данными. Главное слово твоей роли."},
{lvl:4, q:`Что такое ${term("endpoint","эндпоинт")}?`,
 opts:["Конкретный адрес API, куда отправляется запрос","Кнопка выхода","Последняя страница сайта","Конец рабочего дня"],
 correct:0, exp:"Конкретный адрес внутри API, куда шлёшь запрос."},
{lvl:4, q:`Что такое ${term("request","запрос")} и ${term("response","ответ")}?`,
 opts:["Запрос от клиента и ответ от сервера","Логин и пароль","Ветка и коммит","Дизайн и вёрстка"],
 correct:0, exp:"Спросил сервер (request) — получил ответ (response)."},
{lvl:4, q:`Что такое ${term("JSON","формат данных")}?`,
 opts:["Текстовый формат для обмена данными между системами","Язык для дизайна","Тип сервера","Программа для звонков"],
 correct:0, exp:"Формат, в котором передают данные: ключ — значение."},
{lvl:4, q:`Что такое ${term("REST API","стиль API")}?`,
 opts:["Распространённый стиль API на основе обычных HTTP-запросов","Язык вёрстки","Резервная копия","Метод тестирования"],
 correct:0, exp:"Самый ходовой тип API. Услышал «REST» — это про обмен данными."},
{lvl:4, q:`Что означает ${term("CRUD","4 операции с данными")}?`,
 opts:["Create, Read, Update, Delete — создать, прочитать, обновить, удалить","Тип сервера","Имя фреймворка","Способ оплаты"],
 correct:0, exp:"Создать, прочитать, обновить, удалить. Весь ЛК — это CRUD."},
{lvl:4, q:`Что такое ${term("dashboard","личный кабинет")} / ЛК?`,
 opts:["Раздел, где пользователь видит свои данные и операции","Главная рекламная страница","Список багов","Папка с кодом"],
 correct:0, exp:"Личный кабинет: где юзер видит свои данные. Твоя задача."},

/* ===== Состояние ===== */
let i = 0;            // индекс вопроса
let correctCount = 0;
let answered = false;
let lastWasCorrect = false;
const perLevel = {};  // {lvl:{ok,total}}
const shownIntros = {};
const app = document.getElementById("app");
const prog = document.getElementById("prog");
const count = document.getElementById("count");

function setProgress(){
  prog.style.width = (i/Q.length*100) + "%";
  count.textContent = `${Math.min(i+1,Q.length)} / ${Q.length}`;
}

function renderIntro(lvl){
  count.textContent = "";
  prog.style.width = (i/Q.length*100) + "%";
  const L = LEVELS[lvl];
  const nums = Object.keys(LEVELS).map(Number);
  app.innerHTML = `
    <div class="card intro">
      <div class="lvl"><span class="dot"></span>Уровень ${lvl} из ${nums.length}</div>
      <h2>${L.name}</h2>
      <p>${L.intro}</p>
      <button class="next show start" id="go">Начать уровень →</button>
    </div>`;
  document.getElementById("go").onclick = ()=>{ shownIntros[lvl]=true; render(); };
}

function render(){
  if(i >= Q.length){ return renderResult(); }
  const item = Q[i];
  if(!shownIntros[item.lvl]){ return renderIntro(item.lvl); }

  answered = false;
  setProgress();
  const nums = Object.keys(LEVELS).length;
  const letters = ["1","2","3","4"];
  app.innerHTML = `
    <div class="card">
      <div class="lvl"><span class="dot"></span>${LEVELS[item.lvl].name}</div>
      <p class="q">${item.q}</p>
      <div class="opts">
        ${item.opts.map((o,idx)=>`
          <button class="opt" data-idx="${idx}">
            <span class="key">${letters[idx]}</span>
            <span>${o}</span>
          </button>`).join("")}
      </div>
      <div class="exp" id="exp"><span class="lbl">Пояснение</span>${item.exp}</div>
      <button class="next" id="next">Дальше →</button>
    </div>`;

  app.querySelectorAll(".opt").forEach(btn=>{
    btn.onclick = ()=> choose(parseInt(btn.dataset.idx));
  });
}

function choose(idx){
  if(answered) return;
  answered = true;
  const item = Q[i];
  const btns = app.querySelectorAll(".opt");
  perLevel[item.lvl] = perLevel[item.lvl] || {ok:0,total:0};
  perLevel[item.lvl].total++;

  btns.forEach((b,bi)=>{
    b.disabled = true;
    if(bi === item.correct) b.classList.add("correct");
    if(bi === idx && idx !== item.correct) b.classList.add("wrong");
  });

  lastWasCorrect = (idx === item.correct);
  if(lastWasCorrect){ correctCount++; perLevel[item.lvl].ok++; }

  document.getElementById("exp").classList.add("show");
  const next = document.getElementById("next");
  next.classList.add("show");
  next.textContent = (i+1 >= Q.length) ? "Показать результат →" : "Дальше →";
  next.onclick = ()=>{ i++; render(); };
}

function renderResult(){
  prog.style.width = "100%";
  count.textContent = "Готово";
  const pct = Math.round(correctCount/Q.length*100);
  let verdict, sub;
  if(pct>=90){ verdict="Готов к созвону."; sub="Ты уверенно владеешь базой и фразами. На Zoom держись спокойно: понимаешь термины — значит, понимаешь задачу. Не бойся переспросить «Could you clarify that?» — это нормально и звучит профессионально."; }
  else if(pct>=75){ verdict="Сильная база."; sub="Костяк есть. Пройди ещё раз уровни, где ошибался, и подтяни английские фразы из уровня 7 — их стоит проговорить вслух."; }
  else if(pct>=50){ verdict="Фундамент заложен."; sub="Понимание есть, но термины пока плавают. Прогони квиз ещё 1–2 раза, особенно уровень 4 (API/ЛК) — это сердце твоей роли."; }
  else{ verdict="Нужен ещё проход."; sub="Это нормально для старта. Пройди заново, читай пояснения — со второго раза термины закрепятся. У тебя есть время до вторника."; }

  // Save attempt to localStorage
  var stats = JSON.parse(localStorage.getItem('itquiz_stats')||'[]');
  stats.push({
    date: new Date().toISOString().slice(0,16),
    pct: pct,
    correct: correctCount,
    total: Q.length
  });
  if(stats.length>50) stats=stats.slice(-50); // max 50 entries
  localStorage.setItem('itquiz_stats', JSON.stringify(stats));

  // Stats summary
  var best = stats.reduce(function(b,s){return s.pct>b.pct?s:b;},stats[0]);
  var avg = Math.round(stats.reduce(function(s,x){return s+x.pct;},0)/stats.length);
  var last10 = stats.slice(-10);
  var trend = last10.length>=2 && last10[last10.length-1].pct>last10[0].pct
    ? '<span style="color:var(--green)">↑ Растёшь!</span>'
    : (last10.length>=2?'<span style="color:var(--muted)">Стабильно</span>':'');

  var statsHtml = `<div style="margin-top:18px;border-top:1px solid var(--line);padding-top:16px">
    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">История попыток</div>
    <div style="display:flex;gap:20px;margin-bottom:12px;font-size:12px">
      <div><b style="color:var(--navy)">Лучший:</b> ${best.pct}%</div>
      <div><b style="color:var(--navy)">Средний:</b> ${avg}%</div>
      <div><b style="color:var(--navy)">Попыток:</b> ${stats.length}</div>
      <div>${trend}</div>
    </div>
    <div style="display:flex;gap:4px;align-items:flex-end;height:40px">
      ${stats.slice(-15).map(function(s){
        var h = Math.max(4,s.pct);
        var c = s.pct>=80?'var(--green)':s.pct>=50?'#f59e0b':'var(--red)';
        return '<div title="'+s.date+': '+s.pct+'%" style="flex:1;background:'+c+';height:'+h+'%;border-radius:3px 3px 0 0;min-width:6px;opacity:.7"></div>';
      }).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:4px">
      <span>${(stats[0]||{}).date||''}</span><span>${(stats[stats.length-1]||{}).date||''}</span>
    </div>
  </div>`;

  const rows = Object.keys(LEVELS).map(l=>{
    const d = perLevel[l];
    if(!d) return "";
    const p = Math.round(d.ok/d.total*100);
    return `<div class="br-row">
      <span class="name">${LEVELS[l].name}</span>
      <span class="mini"><span style="width:${p}%"></span></span>
      <span class="pct">${p}%</span>
    </div>`;
  }).join("");

  app.innerHTML = `
    <div class="card res">
      <div class="lvl" style="margin:0 auto 14px"><span class="dot"></span>Результат</div>
      <div class="score">${pct}%</div>
      <div class="frac">${correctCount} из ${Q.length} верно</div>
      <div class="verdict">${verdict}</div>
      <p class="sub">${sub}</p>
      <div class="breakdown">${rows}</div>
      ${stats.length>1?statsHtml:''}
      <button class="next show again" id="restart">Пройти заново →</button>
    </div>`;
  document.getElementById("restart").onclick = ()=>{
    i=0; correctCount=0;
    for(const k in perLevel) delete perLevel[k];
    for(const k in shownIntros) delete shownIntros[k];
    render();
  };
}

/* клавиатура: 1-4 ответ, Enter — дальше */
document.addEventListener("keydown", e=>{
  if(["1","2","3","4"].includes(e.key)){
    const btn = app.querySelector(`.opt[data-idx="${+e.key-1}"]`);
    if(btn && !answered) choose(+e.key-1);
  }
  if(e.key === "Enter"){
    const n = document.getElementById("next");
    const g = document.getElementById("go");
    const r = document.getElementById("restart");
    if(g) g.click(); else if(r) r.click(); else if(n && n.classList.contains("show")) n.click();
  }
});

render();
</script>
</body>
</html>
