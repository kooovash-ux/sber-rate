<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Авиаперевозка Индия-Россия</title>
<style>
body{font-family:system-ui,sans-serif;max-width:900px;margin:0 auto;padding:20px;background:#fff;color:#111}
label{display:block;margin-bottom:2px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#444}
input,select{width:100%;padding:8px 10px;font-size:14px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
input[type=range]{padding:0;border:none}
select{cursor:pointer}
.form-group{margin-bottom:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btns{display:flex;gap:0;border:1px solid #ccc;border-radius:4px;overflow:hidden;margin-bottom:12px}
.btns button{flex:1;padding:10px;font-size:14px;border:none;cursor:pointer;background:#f5f5f5}
.btns button.active{background:#333;color:#fff}
.btns button:disabled{opacity:.5;cursor:not-allowed}
.hidden{display:none}
#result-content{border-top:2px solid #333;margin-top:16px;padding-top:12px;font-size:14px;line-height:1.6}
#result-content .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee}
#result-content .total{border-top:2px solid #333;margin-top:8px;padding-top:10px;font-weight:700;font-size:16px}
#total-amount{font-size:32px;font-weight:300;text-align:center;padding:16px 0}
#total-amount small{display:block;font-size:13px;color:#666;font-weight:400}
.slider-wrap{background:#f5f7fa;border:1px solid #ddd;border-radius:6px;padding:14px;text-align:center}
.slider-val{font-size:26px;font-weight:300;margin-bottom:6px}
.slider-val .unit{font-size:13px;color:#666}
.slider-labels{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:2px}
.dashed-btn{background:none;border:1px dashed #ccc;border-radius:4px;padding:8px 14px;font-size:13px;cursor:pointer;width:100%}
.delivery-box{background:#f0f4ff;border:1px solid #ddd;border-radius:6px;padding:14px;margin-bottom:12px}
</style>
</head>
<body>

<h2>Авиаперевозка Индия - Россия</h2>

<div class="btns" id="incterms-toggle" style="margin-bottom:16px">
  <button class="active" data-inc="fob" onclick="setIncoterm('fob')">FOB (авиафрахт)</button>
  <button data-inc="exw" onclick="setIncoterm('exw')">EXW (полный расчёт)</button>
</div>

<div class="row">
  <div>
    <div class="form-group">
      <label>Откуда (Индия)</label>
      <select id="origin-select" onchange="calculate()">
      </select>
    </div>
    <div class="form-group">
      <label>Куда (РФ)</label>
      <select id="dest-select" onchange="calculate()">
        <option value="mow">Москва (MOW)</option>
        <option value="led">Санкт-Петербург (LED)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Вес (кг)</label>
      <div class="slider-wrap">
        <div class="slider-val"><span id="weight-val">100</span><span class="unit"> кг</span></div>
        <input type="range" id="weight" min="1" max="1000" step="1" value="100" oninput="onWeightChange()">
        <div class="slider-labels"><span>1</span><span>250</span><span>500</span><span>1000</span></div>
      </div>
    </div>
    <div class="form-group">
      <label>Объём (CBM)</label>
      <div class="slider-wrap">
        <div class="slider-val"><span id="volume-val">0.5</span><span class="unit"> CBM</span></div>
        <input type="range" id="volume" min="0" max="10" step="0.1" value="0.5" oninput="onVolumeChange()">
        <div class="slider-labels"><span>0</span><span>2.5</span><span>5</span><span>10</span></div>
      </div>
    </div>
    <div class="form-group">
      <label>Количество мест</label>
      <div class="slider-wrap">
        <div class="slider-val"><span id="places-val">1</span><span class="unit"> мест</span></div>
        <input type="range" id="places" min="1" max="100" step="1" value="1" oninput="onPlacesChange()">
        <div class="slider-labels"><span>1</span><span>25</span><span>50</span><span>100</span></div>
      </div>
    </div>

    <!-- Страхование toggle -->
    <button class="dashed-btn" id="insure-toggle-btn" onclick="toggleInsure()" style="margin-bottom:8px">Страхование</button>
    <div id="insure-section" class="hidden" style="margin-bottom:8px"></div>

    <!-- Таможенное оформление toggle -->
    <button class="dashed-btn" id="customs-toggle-btn" onclick="toggleBroker()" style="margin-bottom:8px">Таможенное оформление</button>
    <div id="customs-section" class="hidden" style="margin-bottom:8px"></div>

    <!-- Общий блок: стоимость товара + ТН ВЭД (для страховки/таможни) -->
    <div id="goods-section" class="hidden" style="margin-bottom:8px">
      <div class="delivery-box">
        <div class="btns" id="currency-toggle" style="margin-bottom:10px">
          <button class="active" data-currency="usd" onclick="setCurrency('usd')">USD</button>
          <button data-currency="inr" onclick="setCurrency('inr')">INR</button>
        </div>
        <div class="form-group" style="margin-bottom:10px">
          <label>Стоимость товара</label>
          <div class="slider-wrap">
            <div class="slider-val"><span id="goods-value-display">10 000</span><span class="unit" id="goods-currency-label">$</span></div>
            <input type="range" id="goods-value" min="100" max="200000" step="500" value="10000" oninput="onGoodsValueChange()">
            <div class="slider-labels"><span id="goods-min-label">$100</span><span id="goods-mid-label">$50k</span><span id="goods-max-label">$200k</span></div>
          </div>
        </div>
        <div id="hs-row" class="hidden">
          <div class="form-group" style="margin-bottom:0">
            <label>Код ТН ВЭД (для расчёта пошлины)</label>
            <select id="hs-code" style="height:80px" onchange="calculate()"></select>
          </div>
        </div>
      </div>
    </div>

    <!-- Опасный груз -->
    <button class="dashed-btn" id="dg-toggle-btn" onclick="toggleDG()">Опасный груз</button>
    <div id="dg-section" class="hidden" style="margin-top:8px;padding:12px;background:#fff8f0;border:1px solid #f0d080;border-radius:6px">
      <div style="font-size:13px;color:#c00;margin-bottom:8px">Для опасного груза требуется паспорт безопасности (MSDS)</div>
      <label style="display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:4px">Загрузить MSDS</label>
      <input type="file" id="msds-upload" accept=".pdf,.doc,.docx,.xls,.xlsx" style="margin-bottom:8px;text-transform:none;font-weight:400;font-size:12px">
      <button onclick="alert('Свяжитесь с менеджером')" style="width:100%;padding:10px;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px">Связь с менеджером</button>
    </div>
  </div>
  <div>
    <h3 style="font-weight:400;margin-top:0">Стоимость</h3>
    <div id="result-content">
      <div style="color:#888;font-size:14px">Выберите параметры</div>
    </div>
  </div>
</div>

<script>
const USD_RATE = 85;
const AVIA_RATE = 5.5;

const EXW_COSTS = {
  terminalHandling: 0.22,
  exportClearance: 110,
  vtt: 77,
  ams: 28,
  docFees: 55,
};

const DUTY = {
  '8471': { d: 0, nds: 22, name: 'Вычислительные машины' },
  '8473': { d: 5, nds: 22, name: 'Части для выч. машин' },
  '3926': { d: 6.5, nds: 22, name: 'Изделия из пластмасс' },
  '7326': { d: 8, nds: 22, name: 'Изделия из черных металлов' },
  '8409': { d: 5, nds: 22, name: 'Части двигателей' },
  '8413': { d: 5, nds: 22, name: 'Насосы' },
  '8414': { d: 5, nds: 22, name: 'Компрессоры' },
  '8421': { d: 5, nds: 22, name: 'Фильтры, центрифуги' },
  '8481': { d: 5, nds: 22, name: 'Арматура трубопроводная' },
  '8482': { d: 5, nds: 22, name: 'Подшипники' },
  '8501': { d: 5, nds: 22, name: 'Электродвигатели' },
  '8504': { d: 5, nds: 22, name: 'Трансформаторы' },
  '8517': { d: 0, nds: 22, name: 'Аппаратура связи' },
  '8536': { d: 5, nds: 22, name: 'Аппаратура до 1000В' },
  '8542': { d: 0, nds: 22, name: 'Микросхемы' },
  '8708': { d: 8, nds: 22, name: 'Части автомобилей' },
  '9018': { d: 5, nds: 10, name: 'Медицинские приборы' },
  '9403': { d: 8, nds: 22, name: 'Мебель' },
  '9503': { d: 8, nds: 22, name: 'Игрушки' },
  '6110': { d: 10, nds: 22, name: 'Трикотаж' },
  '6204': { d: 10, nds: 22, name: 'Одежда' },
  '6403': { d: 10, nds: 22, name: 'Обувь кожаная' },
  '4011': { d: 5, nds: 22, name: 'Шины' },
  '4202': { d: 5, nds: 22, name: 'Сумки, чемоданы' },
  '6907': { d: 5, nds: 22, name: 'Плитка керамическая' },
  '7005': { d: 5, nds: 22, name: 'Стекло' },
  '7208': { d: 3, nds: 22, name: 'Прокат' },
  '7304': { d: 5, nds: 22, name: 'Трубы' },
  '7307': { d: 5, nds: 22, name: 'Фитинги' },
  '7318': { d: 5, nds: 22, name: 'Болты, гайки' },
  '7411': { d: 3, nds: 22, name: 'Трубы медные' },
  '7604': { d: 3, nds: 22, name: 'Прутки алюм.' },
  '8302': { d: 5, nds: 22, name: 'Фурнитура' },
  '8418': { d: 5, nds: 22, name: 'Холодильники' },
  '8443': { d: 5, nds: 22, name: 'Принтеры' },
  '8450': { d: 5, nds: 22, name: 'Стиральные машины' },
  '8507': { d: 5, nds: 22, name: 'Аккумуляторы' },
  '8528': { d: 5, nds: 22, name: 'Мониторы, ТВ' },
  '8544': { d: 5, nds: 22, name: 'Кабели, провода' },
  '8716': { d: 5, nds: 22, name: 'Прицепы' },
  '9405': { d: 8, nds: 22, name: 'Светильники' },
  '9506': { d: 5, nds: 22, name: 'Спорт. инвентарь' },
};
const DEFAULT_DUTY = { d: 8, nds: 22, name: 'Прочие товары' };

const INDIA_CITIES = [
  { n: 'Мумбаи (BOM)', v: 'bom', active: true },
  { n: 'Нью-Дели (DEL)', v: 'del', active: true },
  { n: 'Ахмадабад (AMD)', v: 'amd', active: false },
  { n: 'Бангалор (BLR)', v: 'blr', active: false },
  { n: 'Ченнаи (MAA)', v: 'maa', active: false },
  { n: 'Хайдарабад (HYD)', v: 'hyd', active: false },
  { n: 'Калькутта (CCU)', v: 'ccu', active: false },
  { n: 'Пуна (PNQ)', v: 'pnq', active: false },
  { n: 'Джайпур (JAI)', v: 'jai', active: false },
  { n: 'Лакхнау (LKO)', v: 'lko', active: false },
  { n: 'Сурат (STV)', v: 'stv', active: false },
  { n: 'Нагпур (NAG)', v: 'nag', active: false },
  { n: 'Индаур (IDR)', v: 'idr', active: false },
  { n: 'Бхопал (BHO)', v: 'bho', active: false },
  { n: 'Вадодара (BDQ)', v: 'bdq', active: false },
  { n: 'Вишакхапатнам (VTZ)', v: 'vtz', active: false },
  { n: 'Падна (PNY)', v: 'pny', active: false },
  { n: 'Лудхиана (LUH)', v: 'luh', active: false },
  { n: 'Агра (AGR)', v: 'agr', active: false },
  { n: 'Нашик (ISK)', v: 'isk', active: false },
  { n: 'Раджкот (RAJ)', v: 'raj', active: false },
  { n: 'Мадурай (IXM)', v: 'ixm', active: false },
  { n: 'Варанаси (VNS)', v: 'vns', active: false },
  { n: 'Амритсар (ATQ)', v: 'atq', active: false },
  { n: 'Аурангабад (IXU)', v: 'ixu', active: false },
  { n: 'Сринагар (SXR)', v: 'sxr', active: false },
  { n: 'Ранчи (IXR)', v: 'ixr', active: false },
  { n: 'Джамшедпур (IXW)', v: 'ixw', active: false },
  { n: 'Коимбатур (CJB)', v: 'cjb', active: false },
  { n: 'Чандигарх (IXC)', v: 'ixc', active: false },
  { n: 'Майсур (MYQ)', v: 'myq', active: false },
  { n: 'Тируванантапурам (TRV)', v: 'trv', active: false },
  { n: 'Кожикоде (CCJ)', v: 'ccj', active: false },
  { n: 'Гая (GAY)', v: 'gay', active: false },
  { n: 'Тируччираппалли (TRZ)', v: 'trz', active: false },
  { n: 'Бхавнагар (BHU)', v: 'bhu', active: false },
  { n: 'Горакхпур (GOP)', v: 'gop', active: false },
  { n: 'Колхапур (KLH)', v: 'klh', active: false },
  { n: 'Джаландхар (JLH)', v: 'jlh', active: false },
  { n: 'Кота (KTU)', v: 'ktu', active: false },
  { n: 'Удайпур (UDR)', v: 'udr', active: false },
  { n: 'Гувахати (GAU)', v: 'gau', active: false },
  { n: 'Дибругарх (DIB)', v: 'dib', active: false },
  { n: 'Шиллонг (SHL)', v: 'shl', active: false },
  { n: 'Порт-Блэр (IXZ)', v: 'ixz', active: false },
  { n: 'Джамму (IXJ)', v: 'ixj', active: false },
];

let currentIncoterm = 'fob';
let insureOpen = false;
let brokerOpen = false;
let currentCurrency = 'usd';
let goodsVisible = false;

function $(id) { return document.getElementById(id); }

function fmt(v) {
  return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);
}
function fmtRub(v) {
  return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);
}

function setIncoterm(inc) {
  currentIncoterm = inc;
  document.querySelectorAll('#incterms-toggle button').forEach(b => b.classList.toggle('active', b.dataset.inc === inc));
  // FOB: only 2 airports, EXW: all 50
  const sel = $('origin-select');
  sel.innerHTML = '';
  INDIA_CITIES.forEach(function(c) {
    if (inc === 'fob' && !c.active) return;
    const o = document.createElement('option');
    o.value = c.v;
    o.textContent = c.n;
    if (!c.active) { o.disabled = true; o.style.color = '#aaa'; }
    sel.appendChild(o);
  });
  calculate();
}

function onWeightChange() {
  $('weight-val').textContent = parseInt($('weight').value).toLocaleString('ru-RU');
  calculate();
}

function onVolumeChange() {
  $('volume-val').textContent = parseFloat($('volume').value).toFixed(1);
  calculate();
}

function onPlacesChange() {
  $('places-val').textContent = parseInt($('places').value);
  calculate();
}

function toggleInsure() {
  insureOpen = !insureOpen;
  $('insure-toggle-btn').textContent = insureOpen ? 'Страхование' : 'Страхование';
  updateGoodsSection();
  calculate();
}

function toggleBroker() {
  brokerOpen = !brokerOpen;
  $('customs-toggle-btn').textContent = brokerOpen ? 'Таможенное оформление' : 'Таможенное оформление';
  updateGoodsSection();
  calculate();
}

function updateGoodsSection() {
  const show = insureOpen || brokerOpen;
  $('goods-section').style.display = show ? 'block' : 'none';
  $('hs-row').style.display = brokerOpen ? 'block' : 'none';
  goodsVisible = show;
}

function setCurrency(curr) {
  const slider = $('goods-value');
  const oldVal = parseInt(slider.value) || 10000;
  if (curr === 'inr') {
    const newVal = Math.round(oldVal * 85 / 1000) * 1000;
    slider.min = 8500; slider.max = 17000000; slider.step = 1000;
    slider.value = Math.min(Math.max(newVal, 8500), 17000000);
    $('goods-currency-label').textContent = 'INR';
    $('goods-min-label').textContent = 'INR 8.5k';
    $('goods-mid-label').textContent = 'INR 5M';
    $('goods-max-label').textContent = 'INR 17M';
  } else {
    const newVal = Math.round(oldVal / 85 / 500) * 500;
    slider.min = 100; slider.max = 200000; slider.step = 500;
    slider.value = Math.min(Math.max(newVal, 100), 200000);
    $('goods-currency-label').textContent = '$';
    $('goods-min-label').textContent = '$100';
    $('goods-mid-label').textContent = '$50k';
    $('goods-max-label').textContent = '$200k';
  }
  currentCurrency = curr;
  document.querySelectorAll('#currency-toggle button').forEach(b => b.classList.toggle('active', b.dataset.currency === curr));
  onGoodsValueChange();
}

function onGoodsValueChange() {
  const raw = parseInt($('goods-value').value) || 0;
  $('goods-value-display').textContent = raw.toLocaleString('ru-RU');
  calculate();
}

function toggleDG() {
  const sec = $('dg-section');
  const btn = $('dg-toggle-btn');
  const open = sec.style.display === 'block';
  sec.style.display = open ? 'none' : 'block';
}

function calculate() {
  const w = parseFloat($('weight').value) || 0;
  const v = parseFloat($('volume').value) || 0;
  const p = parseInt($('places').value) || 1;
  const isExw = currentIncoterm === 'exw';

  const volW = Math.round(v * 167);
  const chargeable = Math.max(w, volW);
  const useVolWeight = volW > w;

  // Goods value
  const goodsValue = goodsVisible
    ? (currentCurrency === 'inr'
      ? Math.round((parseInt($('goods-value').value) || 0) / USD_RATE)
      : parseInt($('goods-value').value) || 0)
    : 0;

  // HS code
  const hsCode = brokerOpen ? $('hs-code').value.slice(0, 4) : '0000';

  const origName = $('origin-select').options[$('origin-select').selectedIndex].text;
  const destName = $('dest-select').options[$('dest-select').selectedIndex].text;

  const airFreight = Math.max(Math.round(chargeable * AVIA_RATE), 150);

  const thc = Math.round(chargeable * EXW_COSTS.terminalHandling);
  const exportClear = EXW_COSTS.exportClearance;
  const docFees = EXW_COSTS.docFees;
  const vtt = EXW_COSTS.vtt;
  const ams = EXW_COSTS.ams;

  const insureCost = insureOpen && goodsValue > 0 ? Math.round(goodsValue * 0.00085) : 0;
  const customsCost = brokerOpen ? 300 : 0;

  // Customs payments
  const hs = DUTY[hsCode] || DEFAULT_DUTY;
  const duty = brokerOpen && goodsValue > 0 ? Math.round(goodsValue * hs.d / 100) : 0;
  const clearance = brokerOpen && goodsValue > 0 ? Math.min(Math.max(goodsValue * 0.001, 50), 500) : 0;
  const nds = brokerOpen && goodsValue > 0 ? Math.round((goodsValue + airFreight + duty + clearance) * hs.nds / 100) : 0;

  let subtotal = airFreight;
  if (isExw) subtotal += thc + exportClear + docFees + vtt + ams;
  subtotal += insureCost + customsCost;
  subtotal += duty + clearance + nds;

  const total = subtotal;
  const totalRub = total * USD_RATE;
  const rubPerKg = w > 0 ? Math.round(totalRub / w) : 0;

  let html = '';

  html += '<div class="row"><span>Авиафрахт</span><span>' + fmt(airFreight) + '</span></div>';

  if (useVolWeight && volW > 0) {
    html += '<div class="row" style="font-size:12px;color:#666"><span>Объёмный вес ' + volW + ' кг (' + v + ' CBM x 167)</span><span></span></div>';
  }

  if (goodsValue > 0) {
    html += '<div class="row"><span>Товар (FOB)</span><span>' + fmt(goodsValue) + '</span></div>';
  }

  if (isExw) {
    html += '<div class="row"><span>Терминальная обработка (экспорт)</span><span>' + fmt(thc) + '</span></div>';
    html += '<div class="row"><span>Экспортное тамож. оформление</span><span>' + fmt(exportClear) + '</span></div>';
    html += '<div class="row"><span>Сбор за проверку и оформление груза (VTT)</span><span>' + fmt(vtt) + '</span></div>';
    html += '<div class="row"><span>Передача данных в таможню страны назначения (AMS)</span><span>' + fmt(ams) + '</span></div>';
    html += '<div class="row"><span>Документальное оформление</span><span>' + fmt(docFees) + '</span></div>';
  }

  if (insureOpen && insureCost > 0) html += '<div class="row"><span>Страхование (0.085%)</span><span>' + fmt(insureCost) + '</span></div>';
  if (brokerOpen) html += '<div class="row"><span>Таможенное оформление</span><span>' + fmt(customsCost) + '</span></div>';

  if (brokerOpen && goodsValue > 0) {
    html += '<div class="row"><span>Пошлина (' + hs.d + '%)</span><span>' + fmt(duty) + '</span></div>';
    html += '<div class="row"><span>Таможенный сбор</span><span>' + fmt(clearance) + '</span></div>';
    html += '<div class="row"><span>НДС (' + hs.nds + '%)</span><span>' + fmt(nds) + '</span></div>';
  }

  html += '<div id="total-amount">' + fmt(total) + '<small>≈ ' + fmtRub(totalRub) + ' · ' + rubPerKg.toLocaleString('ru-RU') + ' руб/кг</small></div>';
  html += '<div class="row total"><span>ИТОГО (' + (isExw ? 'EXW' : 'FOB') + ')</span><span>' + fmt(total) + '</span></div>';

  html += '<div style="font-size:12px;color:#666;padding:8px;background:#f5f7fa;border-radius:4px;margin-top:8px">';
  html += origName + ' - ' + destName + ' · ' + chargeable + ' кг · ' + p + ' мест · Транзит 3-7 дней';
  html += '</div>';

  $('result-content').innerHTML = html;
}

(function() {
  const sel = $('origin-select');
  INDIA_CITIES.forEach(function(c) {
    if (!c.active) return;
    const o = document.createElement('option');
    o.value = c.v;
    o.textContent = c.n;
    sel.appendChild(o);
  });
  const hsSel = $('hs-code');
  Object.keys(DUTY).sort().forEach(function(code) {
    const o = document.createElement('option');
    o.value = code;
    o.textContent = code + ' - ' + DUTY[code].name;
    if (code === '8471') o.selected = true;
    hsSel.appendChild(o);
  });
  calculate();
})();
</script>
</body>
</html>
