<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LCL FCL Индия-РФ | Калькулятор сборных морских грузов</title>
<!-- Минимум стилей: только чтобы было читаемо. Дизайн — в другой ИИ -->
<style>
body{font-family:system-ui,sans-serif;max-width:900px;margin:0 auto;padding:20px;background:#fff;color:#111}
label{display:block;margin-bottom:2px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#444}
input,select{width:100%;padding:8px 10px;font-size:14px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
input[type=range]{padding:0;border:none}
select{cursor:pointer}
.form-group{margin-bottom:14px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cols{display:flex;gap:12px;flex-wrap:wrap}
.cols label{display:flex;align-items:center;gap:6px;font-size:13px;text-transform:none;font-weight:400;cursor:pointer;border:1px solid #ccc;border-radius:4px;padding:6px 10px;user-select:none}
.cols label:has(input:checked){border-color:#666;background:#f0f0ff}
.btns{display:flex;gap:0;border:1px solid #ccc;border-radius:4px;overflow:hidden;margin-bottom:12px}
.btns button{flex:1;padding:10px;font-size:14px;border:none;cursor:pointer;background:#f5f5f5}
.btns button.active{background:#333;color:#fff}
.btns button:disabled{opacity:.5;cursor:not-allowed}
.hidden{display:none}
#result-content{border-top:2px solid #333;margin-top:16px;padding-top:12px;font-size:14px;line-height:1.6}
#result-content .row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eee}
#result-content .total{border-top:2px solid #333;margin-top:8px;padding-top:10px;font-weight:700;font-size:16px}
#total-amount{font-size:32px;font-weight:300;text-align:center;padding:16px 0}
#total-amount small{display:block;font-size:13px;color:#666;font-weight:400}
.dashed-btn{background:none;border:1px dashed #ccc;border-radius:4px;padding:8px 14px;font-size:13px;cursor:pointer;width:100%}
.dashed-btn:hover{background:#f5f5f5}
.slider-wrap{background:#f5f7fa;border:1px solid #ddd;border-radius:6px;padding:14px;text-align:center}
.slider-val{font-size:26px;font-weight:300;margin-bottom:6px}
.slider-val .unit{font-size:13px;color:#666}
.slider-labels{display:flex;justify-content:space-between;font-size:10px;color:#888;margin-top:2px}
.delivery-box{background:#f0f4ff;border:1px solid #ddd;border-radius:6px;padding:14px;margin-bottom:12px}
.delivery-box .stats{display:flex;justify-content:space-between;font-size:13px;margin-top:6px}
</style>
</head>
<body>

<h2>Калькулятор сборных морских грузов Индия - РФ</h2>


<div class="row">
 <!-- LEFT: Inputs -->
 <div>
 <!-- Incoterms (FOB active, EXW disabled) -->
 <div class="btns" id="incoterms-toggle">
 <button class="active" data-incoterm="fob" onclick="setIncoterm('fob')">FOB</button>
 <button disabled data-incoterm="exw">EXW</button>
 </div>

 <div class="form-group">
 <label>Откуда</label>
 <select id="port-select">
 <option value="ns"> Нава-Шева (Мумбаи)</option>
 <option value="mundra" disabled> Мундра</option>
 </select>
 </div>

 <div class="form-group">
 <label>Куда</label>
 <select id="dest-select" onchange="onDestChange()">
 <option value="spb"> Санкт-Петербург</option>
 <option value="novo"> Новороссийск</option>
 <option value="vlad" disabled style="color:#aaa" title="Добавлю попозже"> Владивосток</option>
 </select>
 <div style="margin-top:4px;font-size:12px;color:#666" id="route-display">Нава-Шева - Санкт-Петербург</div>
 </div>

 <!-- Weight -->
 <div class="form-group">
 <label> Вес брутто (кг)</label>
 <div class="slider-wrap">
 <div class="slider-val"><span id="weight-value">2 697</span><span class="unit"> кг</span></div>
 <input type="range" id="weight" min="1" max="15000" step="10" value="2697" oninput="onWeightChange()">
 <div class="slider-labels"><span>1</span><span>5k</span><span>10k</span><span>15k</span></div>
 </div>
 </div>

 <!-- Volume (main slider) -->
 <div class="form-group">
 <label> Объём груза (CBM)</label>
 <div class="slider-wrap">
 <div class="slider-val"><span id="volume-value">10.1</span><span class="unit"> CBM</span></div>
 <input type="range" id="volume" min="0.5" max="30" step="0.1" value="10.1" oninput="onVolumeChange()">
 <div class="slider-labels"><span>0.5</span><span>10</span><span>20</span><span>30</span></div>
 </div>
 </div>

 <!-- Packages -->
 <div class="form-group">
 <label> Количество мест</label>
 <div class="slider-wrap">
 <div class="slider-val"><span id="places-value">1</span><span class="unit"> мест</span></div>
 <input type="range" id="places" min="1" max="300" step="1" value="1" oninput="onPlacesChange()">
 <div class="slider-labels"><span>1</span><span>100</span><span>200</span><span>300</span></div>
 </div>
 </div>

 <!-- Страхование toggle (даш-кнопка, раскрывает стоимость) -->
 <button class="dashed-btn" id="insure-toggle-btn" onclick="toggleInsure()" style="margin-bottom:8px"> Страхование</button>
 <div id="insure-section" class="hidden" style="margin-bottom:8px">

 </div>

 <!-- Таможенное оформление toggle (даш-кнопка, раскрывает ТН ВЭД + стоимость если нет страховки) -->
 <button class="dashed-btn" id="customs-toggle-btn" onclick="toggleBroker()" style="margin-bottom:8px"> Таможенное оформление</button>
 <div id="customs-section" class="hidden" style="margin-bottom:8px">

 </div>

 <!-- Общий блок: стоимость + ТН ВЭД (показывается когда открыта страховка ИЛИ таможня) -->
 <div id="goods-section" class="hidden" style="margin-bottom:8px">
 <div class="delivery-box">
 <div class="btns" id="currency-toggle" style="margin-bottom:10px">
 <button class="active" data-currency="usd" onclick="setCurrency('usd')"> USD</button>
 <button data-currency="inr" onclick="setCurrency('inr')"> INR</button>
 </div>
 <div class="form-group" style="margin-bottom:10px">
 <label> Стоимость товара</label>
 <div class="slider-wrap">
 <div class="slider-val"><span id="goods-value-display">15 000</span><span class="unit" id="goods-currency-label">$</span></div>
 <input type="range" id="goods-value" min="100" max="200000" step="500" value="15000" oninput="onGoodsValueChange()">
 <div class="slider-labels"><span id="goods-min-label">$100</span><span id="goods-mid-label">$50k</span><span id="goods-max-label">$200k</span></div>
 </div>
 </div>
 <div id="hs-code-row" class="hidden">
 <div class="form-group" style="margin-bottom:0">
 <label> Код ТН ВЭД</label>
 <select id="hs-code" onchange="calculate()" style="height:80px">
 </select>
 </div>
 </div>
 </div>
 </div>

 <!-- Delivery toggle -->
 <button class="dashed-btn" id="delivery-toggle-btn" onclick="toggleDeliveryBtn()"> Доставка по России</button>
 <div id="delivery-calc" class="hidden" style="margin-top:10px">
 <div class="delivery-box">
 <label style="font-size:11px;font-weight:600;text-transform:uppercase;color:#444"> Доставка по России</label>
 <div class="row" style="margin-top:6px">
 <div class="form-group" style="margin-bottom:6px">
 <label>Откуда</label>
 <div style="padding:8px 10px;border:1px solid #ccc;border-radius:4px;font-size:13px;background:#f8faff" id="delivery-from-display">Санкт-Петербург</div>
 <input type="hidden" id="delivery-from" value="spb">
 </div>
 <div class="form-group" style="margin-bottom:6px">
 <label>Город доставки</label>
 <select id="delivery-city" onchange="onDeliveryChange()">
 <option value="">— Выберите —</option>
 </select>
 </div>
 </div>
 <div class="stats">
 <span> <strong id="delivery-km-display">0 км</strong></span>
 <span> <strong id="delivery-cost-display">—</strong></span>
 </div>
 </div>
 </div>
 </div>

 <!-- RIGHT: Results -->
 <div>
 <h3 style="font-weight:400;margin-top:0">Полная стоимость сделки</h3>
 <div id="result-content">
 <div style="color:#888;font-size:14px">Выберите параметры</div>
 </div>
 </div>
</div>

function $(id) { return document.getElementById(id); }

function fmt(v) {
 return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(v);
}

// Linear interpolation for $/CBM
function ratePerCbm(vol, data) {
 if (vol <= data[0].cbm) return data[0].usd;
 if (vol >= data[data.length-1].cbm) {
 const a = data[data.length-2], b = data[data.length-1];
 const slope = (b.usd - a.usd) / (b.cbm - a.cbm);
 return Math.max(Math.round(b.usd + slope * (vol - b.cbm)), 100);
 }
 for (let i = 0; i < data.length - 1; i++) {
 if (vol >= data[i].cbm && vol < data[i+1].cbm) {
 const t = (vol - data[i].cbm) / (data[i+1].cbm - data[i].cbm);
 return Math.round(data[i].usd + t * (data[i+1].usd - data[i].usd));
 }
 }
 return data[data.length-1].usd;
}

}

function onWeightChange() { $('weight-value').textContent = parseInt($('weight').value).toLocaleString('ru-RU'); calculate(); }

 cities.forEach(c => { const o = document.createElement('option'); o.value = c.n; o.textContent = c.n; sel.appendChild(o); });
 if (deliveryVisible) onDeliveryChange();

}

// Currency
function setCurrency(curr) {

 const oldVal = parseInt(slider.value) || 15000;
 if (curr === 'inr') {

 slider.min = 8500; slider.max = 17000000; slider.step = 1000;
 slider.value = Math.min(Math.max(newVal, 8500), 17000000);
 $('goods-currency-label').textContent = '₹';
 $('goods-min-label').textContent = '₹8.5k';
 $('goods-mid-label').textContent = '₹5M';
 $('goods-max-label').textContent = '₹17M';
 } else {
 const newVal = Math.round(oldVal / 85 / 500) * 500;
 slider.min = 100; slider.max = 200000; slider.step = 500;
 slider.value = Math.min(Math.max(newVal, 100), 200000);
 $('goods-currency-label').textContent = '$';
 $('goods-min-label').textContent = '$100';

 $('goods-max-label').textContent = '$200k';
 }
 currentCurrency = curr;
 document.querySelectorAll('#currency-toggle button').forEach(b =>
 b.classList.toggle('active', b.dataset.currency === curr));
 onGoodsValueChange();
}

 }

 deliveryCost = Math.round(city.km * rate);

// ═══════════════════════════════════════════════════
// CERTIFICATION AUTO-DETERMINATION (по ТН ВЭД)
// ═══════════════════════════════════════════════════

const CERT_RULES = {
 // По первым 2-4 цифрам ТН ВЭД
 '33': { type: 'ДС или СГР', label: 'Косметика, благовония', costUsd: 400, note: 'ДС 15-50к руб или СГР 80-500к+' },
 '61': { type: 'ДС/СС', label: 'Одежда трикотажная', costUsd: 350, note: 'ДС 15-50к или СС 50-300к руб' },
 '62': { type: 'ДС/СС', label: 'Одежда текстильная', costUsd: 350, note: 'ДС 15-50к или СС 50-300к руб' },
 '84': { type: 'ДС', label: 'Оборудование', costUsd: 350, note: 'ДС 15-50к руб, чаще всего' },
 '85': { type: 'ДС или СС', label: 'Электроника', costUsd: 500, note: 'ДС 15-50к или СС 50-300к руб' },
 '94': { type: 'ДС', label: 'Мебель', costUsd: 350, note: 'ДС 15-50к руб' },
};

function getCertInfo(hsCode) {
 const prefix = hsCode.slice(0, 2);
 const rule = CERT_RULES[prefix];
 if (rule) return rule;
 // По умолчанию — отказное письмо (товар не под ТР ТС)
 return { type: 'Отказное письмо', label: 'Не подлежит обязательной сертификации', costUsd: 80, note: '3-10к руб, 1-3 дня' };
}

function calculate() {
 const weight = parseFloat($('weight').value) || 0;
 const volume = parseFloat($('volume').value) || 0;
 const goodsValue = goodsVisible
 ? (currentCurrency === 'inr'
 ? Math.round((parseInt($('goods-value').value) || 0) / USD_RATE)
 : parseInt($('goods-value').value) || 0)
 : 0;
 const hsCode = $('hs-code').value.slice(0, 4);
 const haveInsure = insureOpen;
 const haveBroker = brokerOpen;

 // ── Logistics: $/CBM interpolation ──
 const rate = ratePerCbm(volume, FOB_RATES);
 const logistics = Math.round(rate * Math.max(volume, 0.5));

 // ── Customs (только если есть стоимость товара) ──
 const hs = DUTY[hsCode] || DEFAULT_DUTY;
 const duty = goodsValue > 0 ? Math.round(goodsValue * hs.d / 100) : 0;
 const clearance = goodsValue > 0 ? Math.min(Math.max(goodsValue * 0.001, 50), 500) : 0;

 // ── NDS (VAT) base = товар + фрахт + пошлина + сбор ──
 const nds = goodsValue > 0 ? Math.round((goodsValue + logistics + duty + clearance) * hs.nds / 100) : 0;

 // ── Services ──
 const insureCost = haveInsure && goodsValue > 0 ? Math.round(goodsValue * 0.00085) : 0;
 const brokerCost = haveBroker ? 300 : 0;
 // Авто-сертификация по ТН ВЭД (только при таможенном оформлении)
 const certInfo = haveBroker && hsCode ? getCertInfo(hsCode) : null;
 const certCost = certInfo ? certInfo.costUsd : 0;

 // ── Totals ──
 const total = goodsValue + logistics + duty + clearance + nds + certCost + insureCost + brokerCost + deliveryCost;
 const totalRub = total * USD_RATE;
 const perKg = weight > 0 ? total / weight : 0;
 const perCbm = volume > 0 ? total / volume : 0;

 // ── Render ──
 let html = '';

 if (goodsValue > 0) {
 html += `<div class="row"><span>Товар (FOB)</span><span>${fmt(goodsValue)}</span></div>`;
 } else if (insureOpen) {
 html += `<div style="font-size:12px;color:#999;padding:6px 0;border-bottom:1px dashed #ddd"> Стоимость товара не указана</div>`;
 }

 html += `<div class="row"><span> Морской фрахт + порт (${Math.max(volume,0.5).toFixed(1)} CBM × $${rate})</span><span>${fmt(logistics)}</span></div>`;

 if (goodsValue > 0) {
 html += `<div class="row"><span>Таможенная пошлина (${hs.d}%)</span><span>${fmt(duty)}</span></div>`;
 html += `<div class="row"><span>Таможенный сбор</span><span>${fmt(clearance)}</span></div>`;
 html += `<div class="row"><span>НДС (${hs.nds}%, база: товар+фрахт+пошлина)</span><span>${fmt(nds)}</span></div>`;
 }

 if (haveInsure && insureCost > 0) html += `<div class="row"><span>Страхование (0.085%)</span><span>${fmt(insureCost)}</span></div>`;
 if (haveBroker && goodsValue > 0) html += `<div class="row"><span>Таможенное оформление</span><span>${fmt(brokerCost)}</span></div>`;
 if (certInfo && goodsValue > 0) html += `<div class="row"><span> Сертификация: ${certInfo.type}</span><span>${fmt(certCost)}</span></div>`;

 if (deliveryVisible && deliveryCost > 0) {
 const from = PORT_NAMES[$('delivery-from').value] || $('delivery-from').value;
 html += `<div class="row"><span> Доставка по России (${from} - ${$('delivery-city').value})</span><span>${fmt(deliveryCost)}</span></div>`;
 }

 // Big number display + ИТОГО
 html += `<div id="total-amount">${fmt(total)}<small>≈ ${new Intl.NumberFormat('ru-RU',{style:'currency',currency:'RUB',minimumFractionDigits:0}).format(totalRub)} · Landed: ${fmt(perKg)}/кг · ${fmt(perCbm)}/CBM</small></div>`;
 html += `<div class="row total"><span>ИТОГО</span><span>${fmt(total)}</span></div>`;

 if (goodsValue > 0) {
 html += `<div style="font-size:12px;color:#666;padding:8px;background:#f5f7fa;border-radius:4px;margin-top:8px">
 FOB Nhava Sheva · Вес: ${weight.toLocaleString('ru-RU')} кг · Объём: ${volume} CBM ·
 ТН ВЭД: ${hsCode} ${hs.name} · Пошлина: ${hs.d}% · НДС: ${hs.nds}%
 </div>`;
 }

 $('result-content').innerHTML = html;
}
